<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Qween</title>
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/layout.css" />
  <link rel="stylesheet" href="/styles/components.css" />
</head>
<body>
  <div id="app-shell">
    <aside class="sidebar hidden" id="sidebar" hidden>
      <div class="brand">
        <h1>ERP SYSTEM</h1>
        <p>شركة واحدة</p>
      </div>
      <nav id="main-nav" aria-label="التنقل الرئيسي"></nav>
      <button id="logout-btn" class="btn btn-danger hidden" type="button" hidden>تسجيل الخروج</button>
    </aside>

    <main class="content">
      <header class="topbar card compact hidden" hidden>
        <div class="topbar-title">
          <button id="menu-toggle" class="btn btn-secondary mobile-only" type="button">القائمة</button>
          <h2 id="page-title">لوحة التحكم</h2>
        </div>
        <div class="user-badge" id="user-badge">يرجى تسجيل الدخول</div>
      </header>
      <section id="view"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <dialog id="confirm-dialog" class="confirm-dialog">
    <form method="dialog" class="confirm-content">
      <h3 id="confirm-title">تأكيد</h3>
      <p id="confirm-message">هل أنت متأكد؟</p>
      <div class="actions">
        <button class="btn btn-secondary" value="cancel" type="submit">إلغاء</button>
        <button class="btn btn-danger" id="confirm-ok" value="ok" type="submit">تأكيد</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
